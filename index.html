<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Escape Room</title>
<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #aaa;
}

#game {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.room {
  width: 70%;
  background: #141414;
  border: 1px solid #333;
  padding: 20px;
  box-shadow: 0 0 30px black;
  animation: fade 0.4s ease;
}

@keyframes fade {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

.title {
  color: #caa86a;
  font-size: 20px;
}

.narrative {
  color: #aaa;
  margin: 10px 0 20px;
}

.lock {
  display: flex;
  gap: 10px;
}

.dial {
  width: 60px;
  height: 60px;
  background: #222;
  border: 1px solid #444;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  border: 1px solid #444;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="hud"></div>
<div id="game"></div>

<script>
const Game = {

  room: 0,
  lives: 3,

  rooms: [
    {
      title: "The First Door",
      text: "A simple 3-digit lock blocks the exit.",
      answer: "123"
    },
    {
      title: "The Second Chamber",
      text: "Another lock appears.",
      answer: "456"
    },
    {
      title: "Final Chamber",
      text: "Last door. Focus.",
      answer: "789"
    }
  ],

  init() {
    this.render();
  },

  render() {
    const r = this.rooms[this.room];

    document.getElementById("hud").innerText =
      `Room: ${this.room + 1}/${this.rooms.length} | Lives: ${this.lives}`;

    document.getElementById("game").innerHTML = `
      <div class="room">
        <div class="title">${r.title}</div>
        <div class="narrative">${r.text}</div>

        <div class="lock">
          <div class="dial">0</div>
          <div class="dial">0</div>
          <div class="dial">0</div>
        </div>

        <button onclick="Game.check()">ENTER</button>
      </div>
    `;

    this.bind();
  },

  bind() {
    document.querySelectorAll(".dial").forEach(d => {
      d.onclick = () => {
        let v = parseInt(d.innerText);
        d.innerText = (v + 1) % 10;
      };
    });
  },

  check() {
    const input = [...document.querySelectorAll(".dial")]
      .map(d => d.innerText)
      .join("");

    const r = this.rooms[this.room];

    if (input === r.answer) {
      this.room++;

      if (this.room >= this.rooms.length) {
        alert("YOU ESCAPED!");
        location.reload();
      } else {
        this.render();
      }

    } else {
      this.lives--;

      if (this.lives <= 0) {
        alert("GAME OVER");
        location.reload();
      } else {
        alert("Wrong!");
        this.render();
      }
    }
  }
};

Game.init();
</script>

</body>
</html>
