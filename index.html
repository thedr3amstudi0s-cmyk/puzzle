<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #0a0806;
  --surface: #12100d;
  --panel: #1a1612;
  --border: #3a2e22;
  --border2: #5a4a34;
  --gold: #c8a050;
  --gold2: #8a6030;
  --amber: #e8b060;
  --text: #e0d4c0;
  --text2: #a09070;
  --text3: #605040;
  --green: #4a8a5a;
  --green-l: #80c090;
  --red: #8a3a3a;
  --red-l: #c06060;
  --shadow: rgba(0,0,0,0.7);
  --glow: rgba(200,160,80,0.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;cursor:default}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(to bottom,rgba(10,8,6,0.98),rgba(10,8,6,0.8));border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.hud-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:2px}
.room-name{font-family:'Cinzel',serif;font-size:13px;color:var(--amber);letter-spacing:0.1em}
.progress-dots{display:flex;gap:5px}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background 0.4s}
.pdot.done{background:var(--green)}
.pdot.active{background:var(--gold)}
.hud-right{display:flex;align-items:center;gap:16px}
.timer{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--text);letter-spacing:0.05em}
.timer.warn{color:#e8a040}
.timer.danger{color:var(--red-l)}
.lives{display:flex;gap:4px}
.life{font-size:16px;transition:opacity 0.3s}
.life.lost{opacity:0.2;filter:grayscale(1)}

/* ── MAIN ── */
#main{padding-top:60px;min-height:100vh;display:flex;flex-direction:column}

/* ── ROOM VIEW ── */
#room-view{position:relative;width:100%;max-width:900px;margin:0 auto;padding:20px}
.room-scene{position:relative;border:1px solid var(--border2);border-radius:4px;overflow:hidden;background:#0d0a07;box-shadow:0 0 60px rgba(200,160,80,0.08)}
.room-scene svg{display:block;width:100%;height:auto}

/* ── HOTSPOTS ── */
.hotspot{cursor:pointer;transition:opacity 0.2s}
.hotspot:hover .hs-pulse{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
.hs-label{pointer-events:none;opacity:0;transition:opacity 0.2s}
.hotspot:hover .hs-label{opacity:1}

/* ── JOURNAL / CLUE PANEL ── */
#journal{max-width:900px;margin:0 auto;padding:0 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.journal-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:16px}
.journal-card h3{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.15em;color:var(--gold);margin-bottom:10px;text-transform:uppercase}
.journal-text{font-size:14px;color:var(--text2);line-height:1.8;font-style:italic}
.journal-clue{font-size:13px;color:var(--text);line-height:1.9;white-space:pre-wrap;font-family:'Share Tech Mono',monospace}

/* ── PUZZLE MODAL ── */
#puzzle-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,4,3,0.92);align-items:center;justify-content:center}
#puzzle-overlay.open{display:flex}
#puzzle-box{background:var(--panel);border:1px solid var(--border2);border-radius:6px;width:min(680px,95vw);max-height:90vh;overflow-y:auto;position:relative}
.puzzle-header{padding:20px 20px 0;border-bottom:1px solid var(--border);padding-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between}
.puzzle-title{font-family:'Cinzel',serif;font-size:16px;color:var(--amber);letter-spacing:0.08em}
.puzzle-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
.puzzle-close:hover{color:var(--text)}
.puzzle-body{padding:20px}
.puzzle-desc{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:16px;font-style:italic}
.puzzle-task{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:12px 14px;margin-bottom:16px;white-space:pre-wrap;line-height:1.9}

/* ── DRAG & DROP ── */
.drag-area{min-height:60px;border:1px dashed var(--border2);border-radius:4px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.drag-area.over{border-color:var(--gold);background:var(--glow)}
.drag-item{padding:8px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;cursor:grab;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);transition:border-color 0.15s,transform 0.1s;user-select:none}
.drag-item:hover{border-color:var(--gold2)}
.drag-item.dragging{opacity:0.5;transform:scale(0.95);cursor:grabbing}
.drag-slot{min-width:80px;min-height:40px;border:1px dashed var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);font-family:'Share Tech Mono',monospace;padding:4px;background:var(--surface)}
.drag-slot.filled{border-color:var(--border2);background:var(--panel)}
.drag-slot.correct-slot{border-color:var(--green)!important;background:#0a1a0f!important}
.drag-slot.wrong-slot{border-color:var(--red)!important;background:#1a0a0a!important}
.slots-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.slot-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-family:'Share Tech Mono',monospace}

/* ── DIALS / COMBINATION ── */
.dials-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.dial-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.dial-lbl{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:0.1em}
.dial{width:56px;height:56px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:22px;color:var(--gold);cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative;user-select:none}
.dial:hover{border-color:var(--gold2);background:#1f1810}
.dial-arrows{display:flex;flex-direction:column;gap:2px}
.dial-arrow{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;line-height:1;padding:0 2px}
.dial-arrow:hover{color:var(--gold)}

/* ── CIPHER WHEEL ── */
#cipher-canvas{border-radius:50%;cursor:grab;display:block;margin:0 auto}

/* ── WIRE PUZZLE ── */
#wire-canvas{display:block;cursor:crosshair;border:1px solid var(--border);border-radius:4px;background:#0d0a07;width:100%;max-width:500px;margin:0 auto}

/* ── SLIDER LOCK ── */
.sliders-grid{display:grid;gap:12px;margin:12px 0}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row label{font-size:11px;color:var(--text3);font-family:'Share Tech Mono',monospace;width:60px}
input[type=range]{flex:1;accent-color:var(--gold)}
.slider-val{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--amber);width:30px;text-align:right}

/* ── INPUT / BUTTONS ── */
.puzz-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:3px;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;letter-spacing:0.1em}
.puzz-input:focus{border-color:var(--gold2)}
.puzz-input.correct{border-color:var(--green-l);color:var(--green-l)}
.puzz-input.wrong{border-color:var(--red-l)}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn{padding:10px 20px;border:1px solid var(--border2);border-radius:3px;background:none;color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:0.08em;transition:all 0.15s}
.btn:hover{border-color:var(--gold2);color:var(--gold)}
.btn.primary{border-color:var(--gold2);color:var(--gold)}
.btn.primary:hover{background:rgba(200,160,80,0.1)}

/* ── FEEDBACK ── */
.feedback{font-size:14px;padding:10px 14px;border-radius:3px;margin-top:12px;line-height:1.7;display:none;font-style:italic}
.feedback.good{display:block;background:#0a180f;border:1px solid var(--green);color:var(--green-l)}
.feedback.bad{display:block;background:#180a0a;border:1px solid var(--red);color:var(--red-l)}

/* ── HINT ── */
.hint-toggle{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;margin-top:10px;padding:0;letter-spacing:0.06em}
.hint-toggle:hover{color:var(--text2)}
.hint-box{display:none;font-size:13px;color:var(--text3);margin-top:8px;padding:8px 12px;background:var(--surface);border-radius:3px;line-height:1.7;font-style:italic}

/* ── END SCREEN ── */
#end-screen{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,4,3,0.97);align-items:center;justify-content:center;text-align:center;flex-direction:column}
#end-screen.show{display:flex}
.end-icon{font-size:72px;margin-bottom:1.5rem}
.end-title{font-family:'Cinzel',serif;font-size:32px;color:var(--gold);margin-bottom:1rem;letter-spacing:0.1em}
.end-body{font-size:17px;color:var(--text2);line-height:1.9;max-width:480px;margin-bottom:1.5rem;font-style:italic}
.end-meta{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:2rem;letter-spacing:0.1em}

/* ── ITEM INSPECT ── */
#inspect-overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(5,4,3,0.95);align-items:center;justify-content:center}
#inspect-overlay.open{display:flex}
#inspect-box{background:var(--panel);border:1px solid var(--border2);border-radius:6px;padding:24px;max-width:500px;width:90vw;position:relative}
.inspect-title{font-family:'Cinzel',serif;font-size:15px;color:var(--amber);margin-bottom:14px}
.inspect-img{width:100%;border-radius:3px;border:1px solid var(--border);margin-bottom:14px;background:var(--surface)}
.inspect-text{font-size:15px;color:var(--text2);line-height:1.8;font-style:italic}
.inspect-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
.inspect-close:hover{color:var(--text)}

/* ── NOTIFY ── */
#notify{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;pointer-events:none}
.notif{background:var(--panel);border:1px solid var(--border2);border-radius:4px;padding:10px 20px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);opacity:0;transform:translateY(10px);transition:all 0.3s;margin-top:6px;text-align:center}
.notif.show{opacity:1;transform:translateY(0)}
.notif.success{border-color:var(--green);color:var(--green-l)}
.notif.error{border-color:var(--red);color:var(--red-l)}

/* ── INVENTORY BAR ── */
#inventory{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(10,8,6,0.95);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px}
.inv-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.1em;white-space:nowrap}
.inv-items{display:flex;gap:8px;flex-wrap:wrap}
.inv-item{padding:5px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Share Tech Mono',monospace;transition:border-color 0.15s}
.inv-item:hover{border-color:var(--gold2);color:var(--gold)}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-title">&#9670; Escape Room</div>
  <div class="hud-mid">
    <div class="room-name" id="room-name">The Locked Study</div>
    <div class="progress-dots" id="prog-dots"></div>
  </div>
  <div class="hud-right">
    <div class="timer" id="timer">60:00</div>
    <div class="lives" id="lives"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="room-view">
    <div class="room-scene" id="room-scene"></div>
  </div>
  <div id="journal">
    <div class="journal-card">
      <h3>&#128196; Notes</h3>
      <div class="journal-text" id="journal-text">Examine the room. Click on objects that glow or seem interactive.</div>
    </div>
    <div class="journal-card">
      <h3>&#128270; Observations</h3>
      <div class="journal-clue" id="journal-clue">—</div>
    </div>
  </div>
</div>

<!-- INVENTORY -->
<div id="inventory">
  <div class="inv-label">INVENTORY</div>
  <div class="inv-items" id="inv-items"><span style="font-size:12px;color:var(--text3);font-family:'Share Tech Mono',monospace">empty</span></div>
</div>

<!-- PUZZLE OVERLAY -->
<div id="puzzle-overlay">
  <div id="puzzle-box">
    <div class="puzzle-header">
      <div class="puzzle-title" id="puzz-title">Puzzle</div>
      <button class="puzzle-close" onclick="closePuzzle()">✕</button>
    </div>
    <div class="puzzle-body" id="puzz-body"></div>
  </div>
</div>

<!-- INSPECT OVERLAY -->
<div id="inspect-overlay">
  <div id="inspect-box">
    <button class="inspect-close" onclick="closeInspect()">✕</button>
    <div class="inspect-title" id="insp-title"></div>
    <svg class="inspect-img" id="insp-svg" viewBox="0 0 400 200"></svg>
    <div class="inspect-text" id="insp-text"></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn" onclick="closeInspect()">Put it down</button>
      <button class="btn primary" id="insp-use-btn" style="display:none">Use this item</button>
    </div>
  </div>
</div>

<!-- NOTIFY -->
<div id="notify"></div>

<!-- END SCREEN -->
<div id="end-screen">
  <div class="end-icon" id="end-icon">🔓</div>
  <div class="end-title" id="end-title">You Escaped</div>
  <div class="end-body" id="end-body"></div>
  <div class="end-meta" id="end-meta"></div>
  <button class="btn primary" onclick="restart()" style="margin-top:1rem">[ Play Again ]</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════
let state = {
  room: 0,
  lives: 3,
  timerSec: 3600,
  timerInt: null,
  startTime: Date.now(),
  inventory: [],
  solved: {},
  roomsSolved: 0
};

// ═══════════════════════════════════════════════════════
// ROOMS DEFINITION
// ═══════════════════════════════════════════════════════
const ROOMS = [

  // ─── ROOM 0: THE LOCKED STUDY ───
  {
    name: "The Locked Study",
    note: "You wake in a candlelit study. Dust motes drift through amber air. The door is sealed with a four-dial combination lock.",
    clue: "Examine the objects in the room.\nClick anything that seems important.",
    bgColor: "#0e0b08",
    renderScene: renderStudy,
    hotspots: [
      { id:"portrait", label:"Portrait", x:0.12, y:0.22, w:0.14, h:0.28, action:"inspect", data:"portrait" },
      { id:"bookshelf", label:"Bookshelf", x:0.35, y:0.1, w:0.28, h:0.55, action:"inspect", data:"bookshelf" },
      { id:"clock", label:"Mantle Clock", x:0.7, y:0.25, w:0.12, h:0.18, action:"inspect", data:"clock" },
      { id:"lock", label:"Combination Lock", x:0.44, y:0.72, w:0.14, h:0.16, action:"puzzle", data:"dial-lock" },
      { id:"desk", label:"Writing Desk", x:0.55, y:0.6, w:0.3, h:0.25, action:"inspect", data:"desk" }
    ],
    puzzles: {
      "dial-lock": {
        title: "Combination Lock",
        type: "dials",
        desc: "A four-dial brass lock seals the door. Each dial runs 0–9. You need to work out the combination from clues in the room.",
        dials: 4,
        answer: [7,8,9,5],
        dialLabels: ["I","II","III","IV"],
        hint: "Dial I: The Bastille fell in 1789 — what digit is in the tens place? Dial II: Count primes 1–20 (2,3,5,7,11,13,17,19). Dial III: Last digit of 1789. Dial IV: Clock shows 2h 5min before noon = what hour?",
        onSolve: () => { notify("The lock clicks open!", "success"); advanceRoom(); }
      }
    },
    inspectItems: {
      portrait: {
        title: "Oil Portrait",
        desc: "A stern-faced man. A brass plate reads:\n'Colonel H. Ashford, born the year the Bastille fell, 1789.'\nDial I is the TENS digit of that year.",
        svgFn: drawPortrait
      },
      bookshelf: {
        title: "The Bookshelf",
        desc: "Dozens of volumes. One spine stands out, labelled:\n'A Treatise on Prime Numbers.'\nInside the cover: 'Between 1 and 20 there are exactly [smudged] prime numbers.'\nDial II is that count.",
        svgFn: drawBookshelf
      },
      clock: {
        title: "Mantle Clock",
        desc: "The clock has stopped. Its hands point to 2 hours and 5 minutes before noon.\nWhat hour is that? Dial IV is that hour.\n\nAlso note the year engraved on the base: 1789. Dial III is the last digit.",
        svgFn: drawClock
      },
      desk: {
        title: "Writing Desk",
        desc: "Papers scattered everywhere. A note reads:\n'The combination is hidden in plain sight. Study the room carefully — portrait, books, clock. Work out what each object tells you.'",
        svgFn: drawDesk
      }
    }
  },

  // ─── ROOM 1: THE WINE CELLAR ───
  {
    name: "The Wine Cellar",
    note: "Stone steps lead down to a vaulted cellar. Racks of bottles stretch into shadow. A heavy iron gate blocks the far passage.",
    clue: "The gate lock needs a 3-letter code.\nSomething about the wine labels…",
    bgColor: "#09080c",
    renderScene: renderCellar,
    hotspots: [
      { id:"rack1", label:"Wine Rack A", x:0.05, y:0.15, w:0.2, h:0.65, action:"inspect", data:"rack1" },
      { id:"rack2", label:"Wine Rack B", x:0.3, y:0.15, w:0.2, h:0.65, action:"inspect", data:"rack2" },
      { id:"rack3", label:"Wine Rack C", x:0.55, y:0.15, w:0.2, h:0.65, action:"inspect", data:"rack3" },
      { id:"gate", label:"Iron Gate", x:0.78, y:0.2, w:0.18, h:0.65, action:"puzzle", data:"gate-code" }
    ],
    puzzles: {
      "gate-code": {
        title: "Iron Gate — Letter Lock",
        type: "word-input",
        desc: "Three rotating letter dials. Each wine rack holds a bottle with a vintage year. The FIRST LETTER of each year spelled out (in English) gives the code — rack A, B, C in order.",
        maxLen: 3,
        answer: "NET",
        hint: "Rack A: 1900 → NINETEEN HUNDRED → first letter N. Rack B: 1842 → EIGHTEEN FORTY-TWO → first letter E. Rack C: 1756 → SEVENTEEN FIFTY-SIX → first letter S... wait, check each rack label carefully.",
        onSolve: () => { notify("The gate swings open!", "success"); addInventory("iron-key", "🗝 Iron Key"); advanceRoom(); }
      }
    },
    inspectItems: {
      rack1: {
        title: "Wine Rack A",
        desc: "Each bottle is labelled. The oldest bottle in this rack reads:\n'Château Moreau — Vintage 1900'\nSpell out that year in English. Take the first letter.",
        svgFn: drawRack1
      },
      rack2: {
        title: "Wine Rack B",
        desc: "A bottle near eye-level: 'Domaine Lefèvre — Vintage 1842'\nSpell out 1842 in English. Take the first letter.",
        svgFn: drawRack2
      },
      rack3: {
        title: "Wine Rack C",
        desc: "A dusty bottle at the bottom: 'Reserve Noire — Vintage 1970'\nSpell out 1970 in English. Take the first letter.",
        svgFn: drawRack3
      }
    }
  },

  // ─── ROOM 2: THE ALCHEMIST'S LAB ───
  {
    name: "The Alchemist's Lab",
    note: "Rows of coloured flasks bubble quietly. The air smells of sulfur and old books. A locked cabinet holds what you need next.",
    clue: "Drag the correct flasks into the\nreaction sequence to open the cabinet.",
    bgColor: "#080c09",
    renderScene: renderLab,
    hotspots: [
      { id:"formula", label:"Formula Board", x:0.04, y:0.08, w:0.28, h:0.48, action:"inspect", data:"formula" },
      { id:"cabinet", label:"Locked Cabinet", x:0.72, y:0.1, w:0.24, h:0.75, action:"puzzle", data:"flask-puzzle" },
      { id:"table", label:"Flask Table", x:0.32, y:0.5, w:0.36, h:0.38, action:"inspect", data:"table" }
    ],
    puzzles: {
      "flask-puzzle": {
        title: "Flask Sequence",
        type: "drag-order",
        desc: "The formula board shows the correct order of elements. Drag the flasks into the right sequence to trigger the reaction.",
        items: ["🔴 Red (Fe)", "🔵 Blue (H₂O)", "🟡 Yellow (S)", "🟢 Green (Cu)", "🟣 Purple (K)"],
        answer: [1, 3, 0, 4, 2],
        hint: "The formula reads: Water first, then copper, then iron, then potassium, last sulfur. Match symbols: H₂O=Blue, Cu=Green, Fe=Red, K=Purple, S=Yellow.",
        onSolve: () => { notify("The cabinet unlocks with a hiss!", "success"); addInventory("vial", "⚗ Crystal Vial"); advanceRoom(); }
      }
    },
    inspectItems: {
      formula: {
        title: "Formula Board",

// RENDER ENGINE
// ═══════════════════════════════════════════════════════
function renderRoom() {
  const room = ROOMS[state.room];
  document.getElementById('room-name').textContent = room.name;
  document.getElementById('journal-text').textContent = room.note;
  document.getElementById('journal-clue').textContent = room.clue;

  // Scene
  document.getElementById('room-scene').innerHTML = room.renderScene();

  // Overlay hotspot divs
  const sceneEl = document.getElementById('room-scene');
  const svg = sceneEl.querySelector('svg');
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:absolute;inset:0;pointer-events:none';
  svg.style.position = 'relative';
  sceneEl.style.position = 'relative';

  room.hotspots.forEach(hs => {
    const div = document.createElement('div');
    div.style.cssText = `position:absolute;left:${hs.x*100}%;top:${hs.y*100}%;width:${hs.w*100}%;height:${hs.h*100}%;cursor:pointer;pointer-events:all;border:1px solid transparent;border-radius:2px;transition:all 0.2s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px`;
    div.setAttribute('title', hs.label);
    div.addEventListener('mouseenter', () => {
      div.style.border = '1px solid rgba(200,160,80,0.4)';
      div.style.background = 'rgba(200,160,80,0.06)';
      div.querySelector('.hs-tag').style.opacity = '1';
    });
    div.addEventListener('mouseleave', () => {
      div.style.border = '1px solid transparent';
      div.style.background = 'transparent';
      div.querySelector('.hs-tag').style.opacity = '0';
    });
    const tag = document.createElement('div');
    tag.className = 'hs-tag';
    tag.style.cssText = 'opacity:0;transition:opacity 0.2s;background:rgba(10,8,6,0.85);border:1px solid rgba(200,160,80,0.5);border-radius:2px;padding:2px 7px;font-family:Share Tech Mono,monospace;font-size:10px;color:#c8a050;pointer-events:none;white-space:nowrap';
    tag.textContent = hs.label;
    div.appendChild(tag);

    div.addEventListener('click', () => {
      if (hs.action === 'inspect') openInspect(hs.data);
      else if (hs.action === 'puzzle') openPuzzle(hs.data);
    });
    wrapper.appendChild(div);
  });
  sceneEl.appendChild(wrapper);

  renderProgress();
  renderLives();
}

function renderProgress() {
  const el = document.getElementById('prog-dots');
  el.innerHTML = '';
  ROOMS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < state.room ? ' done' : i === state.room ? ' active' : '');
    el.appendChild(d);
  });
}

function renderLives() {
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span');
    s.className = 'life' + (i >= state.lives ? ' lost' : '');
    s.textContent = '♥';
    el.appendChild(s);
  }
}

// ═══════════════════════════════════════════════════════
function openInspect(id) {
  const room = ROOMS[state.room];
  const item = room.inspectItems[id];
  if (!item) return;
  document.getElementById('insp-title').textContent = item.title;
  document.getElementById('insp-text').textContent = item.desc;
  const svg = document.getElementById('insp-svg');
  svg.innerHTML = '';
  item.svgFn(svg);
  document.getElementById('inspect-overlay').classList.add('open');
}
function closeInspect() {
  document.getElementById('inspect-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════
function openPuzzle(id) {
  const room = ROOMS[state.room];
  const puzz = room.puzzles[id];
  if (!puzz) return;
  if (state.solved[`${state.room}-${id}`]) { notify("Already solved!", "success"); return; }
  document.getElementById('puzz-title').textContent = puzz.title;
  const body = document.getElementById('puzz-body');
  body.innerHTML = '';

  const desc = document.createElement('div');
  desc.className = 'puzzle-desc';
  desc.textContent = puzz.desc;
  body.appendChild(desc);

  if (puzz.type === 'dials') buildDialPuzzle(body, puzz, id);
  else if (puzz.type === 'word-input') buildWordInput(body, puzz, id);
  else if (puzz.type === 'drag-order') buildDragOrder(body, puzz, id);
  else if (puzz.type === 'wire') buildWirePuzzle(body, puzz, id);
  else if (puzz.type === 'sliders') buildSliderPuzzle(body, puzz, id);

  const hintBtn = document.createElement('button');
  hintBtn.className = 'hint-toggle';
  hintBtn.textContent = '[ need a hint? ]';
  const hintBox = document.createElement('div');
  hintBox.className = 'hint-box';
  hintBox.textContent = puzz.hint;
  hintBtn.onclick = () => { hintBox.style.display = hintBox.style.display === 'block' ? 'none' : 'block'; };
  body.appendChild(hintBtn);
  body.appendChild(hintBox);

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = 'puzz-fb';
  body.appendChild(fb);

  document.getElementById('puzzle-overlay').classList.add('open');
}

function closePuzzle() {
  document.getElementById('puzzle-overlay').classList.remove('open');
}

function markSolved(roomIdx, puzzleId, puzz) {
  state.solved[`${roomIdx}-${puzzleId}`] = true;
  const fb = document.getElementById('puzz-fb');
  if (fb) { fb.className = 'feedback good'; fb.textContent = puzz.onSolve ? '' : 'Solved!'; }
  setTimeout(() => {
    closePuzzle();
    if (puzz.onSolve) puzz.onSolve();
  }, 800);
}

function loseLife(msg) {
  state.lives--;
  renderLives();
  notify(msg || 'Wrong — try again', 'error');
  if (state.lives <= 0) setTimeout(() => showEnd(false), 1200);
}

// ── DIAL PUZZLE ──
function buildDialPuzzle(body, puzz, puzzId) {
  const dialValues = new Array(puzz.dials).fill(0);
  const row = document.createElement('div');
  row.className = 'dials-row';

  dialValues.forEach((_, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'dial-wrap';
    const lbl = document.createElement('div');
    lbl.className = 'dial-lbl';
    lbl.textContent = puzz.dialLabels ? puzz.dialLabels[i] : `DIAL ${i+1}`;

    const arrowUp = document.createElement('button');
    arrowUp.className = 'dial-arrow';
    arrowUp.textContent = '▲';

    const dial = document.createElement('div');
    dial.className = 'dial';
    dial.textContent = '0';
    dial.id = `dial-${i}`;

    const arrowDn = document.createElement('button');
    arrowDn.className = 'dial-arrow';
    arrowDn.textContent = '▼';

    arrowUp.onclick = () => { dialValues[i] = (dialValues[i] + 1) % 10; dial.textContent = dialValues[i]; };
    arrowDn.onclick = () => { dialValues[i] = (dialValues[i] + 9) % 10; dial.textContent = dialValues[i]; };
    dial.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) { dialValues[i] = (dialValues[i] + 1) % 10; }
      else { dialValues[i] = (dialValues[i] + 9) % 10; }
      dial.textContent = dialValues[i];
    });

    wrap.appendChild(lbl);
    wrap.appendChild(arrowUp);
    wrap.appendChild(dial);
    wrap.appendChild(arrowDn);
    row.appendChild(wrap);
  });
  body.appendChild(row);

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn primary';
  submitBtn.textContent = 'Try Combination';
  submitBtn.onclick = () => {
    const correct = puzz.answer.every((v, i) => v === dialValues[i]);
    if (correct) markSolved(state.room, puzzId, puzz);
    else loseLife('Wrong combination — check your clues and try again.');
  };
  btnRow.appendChild(submitBtn);
  body.appendChild(btnRow);
}

// ── WORD INPUT ──
function buildWordInput(body, puzz, puzzId) {
  const inp = document.createElement('input');
  inp.className = 'puzz-input';
  inp.maxLength = puzz.maxLen || 20;
  inp.placeholder = 'Enter code...';
  inp.style.textTransform = 'uppercase';
  inp.style.letterSpacing = '0.2em';
  inp.style.marginBottom = '12px';
  body.appendChild(inp);

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  const btn = document.createElement('button');
  btn.className = 'btn primary';
  btn.textContent = 'Confirm';
  btn.onclick = () => {
    const val = inp.value.trim().toUpperCase();
    if (val === puzz.answer.toUpperCase()) {
      inp.classList.add('correct');
      markSolved(state.room, puzzId, puzz);
    } else {
      inp.classList.add('wrong');
      setTimeout(() => inp.classList.remove('wrong'), 600);
      loseLife('Wrong code — re-examine the racks.');
    }
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  btnRow.appendChild(btn);
  body.appendChild(btnRow);
}

// ── DRAG ORDER ──
function buildDragOrder(body, puzz, puzzId) {
  const task = document.createElement('div');
  task.className = 'puzzle-task';
  task.textContent = 'Drag items from the source into the sequence slots in the correct order.';
  body.appendChild(task);

  // Source pool
  const poolLabel = document.createElement('div');
  poolLabel.className = 'slot-label';
  poolLabel.textContent = 'AVAILABLE FLASKS:';
  body.appendChild(poolLabel);

  const pool = document.createElement('div');
  pool.className = 'drag-area';
  pool.id = 'drag-pool';

  // Shuffled items
  const shuffled = [...puzz.items].map((item, origIdx) => ({ item, origIdx }))
    .sort(() => Math.random() - 0.5);

  shuffled.forEach(({ item, origIdx }) => {
    const d = document.createElement('div');
    d.className = 'drag-item';
    d.textContent = item;
    d.draggable = true;
    d.dataset.origIdx = origIdx;
    d.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', origIdx);
      d.classList.add('dragging');
    });
    d.addEventListener('dragend', () => d.classList.remove('dragging'));
    pool.appendChild(d);
  });
  body.appendChild(pool);

  // Slots
  const slotsLabel = document.createElement('div');
  slotsLabel.className = 'slot-label';
  slotsLabel.style.marginTop = '12px';
  slotsLabel.textContent = 'SEQUENCE (drop in order):';
  body.appendChild(slotsLabel);

  const slotsRow = document.createElement('div');
  slotsRow.className = 'slots-row';
  const slotData = new Array(puzz.items.length).fill(null);

  for (let i = 0; i < puzz.items.length; i++) {
    const col = document.createElement('div');
    col.style.display = 'flex';
    col.style.flexDirection = 'column';
    col.style.alignItems = 'center';
    col.style.gap = '4px';
    const lbl = document.createElement('div');
    lbl.className = 'slot-label';
    lbl.textContent = `Step ${i+1}`;
    const slot = document.createElement('div');
    slot.className = 'drag-slot';
    slot.dataset.slotIdx = i;
    slot.textContent = 'drop here';

    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('over');
      const origIdx = parseInt(e.dataTransfer.getData('text/plain'));
      // Remove from any previous slot
      slotData.forEach((v, si) => { if (v === origIdx) slotData[si] = null; });
      slotData[i] = origIdx;
      slot.textContent = puzz.items[origIdx];
      slot.classList.add('filled');
    });
    col.appendChild(lbl);
    col.appendChild(slot);
    slotsRow.appendChild(col);
  }
  body.appendChild(slotsRow);

  // Pool also accepts drops (to return items)
  pool.addEventListener('dragover', e => { e.preventDefault(); pool.classList.add('over'); });
  pool.addEventListener('dragleave', () => pool.classList.remove('over'));
  pool.addEventListener('drop', e => {
    e.preventDefault();
    pool.classList.remove('over');
    const origIdx = parseInt(e.dataTransfer.getData('text/plain'));
    slotData.forEach((v, si) => { if (v === origIdx) slotData[si] = null; });
    // Update slot displays
    slotsRow.querySelectorAll('.drag-slot').forEach((sl, si) => {
      if (slotData[si] === null) { sl.textContent = 'drop here'; sl.classList.remove('filled'); }
    });
  });

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.style.marginTop = '12px';
  const btn = document.createElement('button');
  btn.className = 'btn primary';
  btn.textContent = 'Trigger Reaction';
  btn.onclick = () => {
    if (slotData.some(v => v === null)) { notify('Fill all slots first!', 'error'); return; }
    const correct = puzz.answer.every((v, i) => v === slotData[i]);
    const slots = slotsRow.querySelectorAll('.drag-slot');
    if (correct) {
      slots.forEach(s => s.classList.add('correct-slot'));
      markSolved(state.room, puzzId, puzz);
    } else {
      slots.forEach((s, i) => {
        s.classList.add(puzz.answer[i] === slotData[i] ? 'correct-slot' : 'wrong-slot');
      });
      loseLife('Wrong sequence — the reaction failed.');
    }
  };
  btnRow.appendChild(btn);
  body.appendChild(btnRow);
}

// ── WIRE PUZZLE ──
function buildWirePuzzle(body, puzz, puzzId) {
  const canvas = document.createElement('canvas');
  canvas.id = 'wire-canvas';
  canvas.width = 500;
  canvas.height = 220;
  canvas.style.cssText = 'display:block;cursor:crosshair;border:1px solid var(--border);border-radius:4px;background:#0d0a07;width:100%;max-width:500px;margin:0 auto';
  body.appendChild(canvas);

  const connections = new Array(puzz.pairs.length).fill(null);
  let dragging = null;
  let mousePos = { x: 0, y: 0 };

  const leftX = 60, rightX = 440;
  const spacing = 44, startY = 40;

  function getLeftPos(i) { return { x: leftX, y: startY + i * spacing }; }
  function getRightPos(i) { return { x: rightX, y: startY + i * spacing }; }

  function draw() {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0d0a07';
    ctx.fillRect(0, 0, W, H);

    // Draw completed connections
    connections.forEach((rightIdx, leftIdx) => {
      if (rightIdx === null) return;
      const lp = getLeftPos(leftIdx), rp = getRightPos(rightIdx);
      ctx.beginPath();
      ctx.moveTo(lp.x, lp.y);
      ctx.bezierCurveTo(lp.x + 120, lp.y, rp.x - 120, rp.y, rp.x, rp.y);
      ctx.strokeStyle = puzz.pairs[leftIdx].color;
      ctx.lineWidth = 3;
      ctx.stroke();
    });

    // Draw active drag line
    if (dragging !== null) {
      const lp = getLeftPos(dragging);
      ctx.beginPath();
      ctx.moveTo(lp.x, lp.y);
      ctx.bezierCurveTo(lp.x + 80, lp.y, mousePos.x - 80, mousePos.y, mousePos.x, mousePos.y);
      ctx.strokeStyle = puzz.pairs[dragging].color;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Left terminals
    puzz.pairs.forEach((p, i) => {
      const pos = getLeftPos(i);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = p.color;
      ctx.font = '10px Share Tech Mono,monospace';
      ctx.textAlign = 'left';
      ctx.fillText(p.label, pos.x + 16, pos.y + 4);
    });

    // Right terminals
    puzz.pairs.forEach((_, i) => {
      const pos = getRightPos(i);
      const isConnected = connections.some(c => c === i);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);
      ctx.fillStyle = isConnected ? '#3a5a3a' : '#1a1a2a';
      ctx.fill();
      ctx.strokeStyle = isConnected ? '#80c090' : '#3a4060';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#6070a0';
      ctx.font = '10px Share Tech Mono,monospace';
      ctx.textAlign = 'right';
      ctx.fillText(['A','B','C','D'][i], pos.x - 16, pos.y + 4);
    });
  }

  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  canvas.addEventListener('mousedown', e => {
    const pos = getCanvasCoords(e);
    puzz.pairs.forEach((_, i) => {
      const lp = getLeftPos(i);
      const dist = Math.hypot(pos.x - lp.x, pos.y - lp.y);
      if (dist < 16) { dragging = i; connections[i] = null; draw(); }
    });
  });

  canvas.addEventListener('mousemove', e => {
    if (dragging === null) return;
    mousePos = getCanvasCoords(e);
    draw();
  });

  canvas.addEventListener('mouseup', e => {
    if (dragging === null) return;
    const pos = getCanvasCoords(e);
    let connected = false;
    puzz.pairs.forEach((_, i) => {
      const rp = getRightPos(i);
      const dist = Math.hypot(pos.x - rp.x, pos.y - rp.y);
      if (dist < 20) { connections[dragging] = i; connected = true; }
    });
    dragging = null;
    draw();

    // Check if all connected correctly
    const allCorrect = puzz.pairs.every((p, i) => connections[i] === p.match);
    if (connections.every(c => c !== null) && !allCorrect) {
      loseLife('Wrong wiring — check the logbook and try again.');
      connections.fill(null);
      draw();
    } else if (allCorrect) {
      markSolved(state.room, puzzId, puzz);
    }
  });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }));
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }));
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: touch.clientX, clientY: touch.clientY }));
  }, { passive: false });

  draw();

  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn';
  resetBtn.style.marginTop = '8px';
  resetBtn.textContent = 'Reset Wires';
  resetBtn.onclick = () => { connections.fill(null); draw(); };
  body.appendChild(resetBtn);
}

// ── SLIDER PUZZLE ──
function buildSliderPuzzle(body, puzz, puzzId) {
  puzz.sliders.forEach((sl, i) => {
    const info = document.createElement('div');
    info.style.cssText = 'font-size:12px;color:var(--text3);font-family:Share Tech Mono,monospace;margin-bottom:4px';
    info.textContent = sl.clue;
    body.appendChild(info);

    const row = document.createElement('div');
    row.className = 'slider-row';

    const lbl = document.createElement('label');
    lbl.textContent = sl.label;

    const input = document.createElement('input');
    input.type = 'range';
    input.min = sl.min;
    input.max = sl.max;
    input.value = sl.value;
    input.step = 1;
    input.id = `slider-${i}`;

    const val = document.createElement('div');
    val.className = 'slider-val';
    val.textContent = sl.value;

    input.addEventListener('input', () => { val.textContent = input.value; });

    row.appendChild(lbl);
    row.appendChild(input);
    row.appendChild(val);
    body.appendChild(info);
    body.appendChild(row);
  });

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.style.marginTop = '16px';
  const btn = document.createElement('button');
  btn.className = 'btn primary';
  btn.textContent = 'Set Combination';
  btn.onclick = () => {
    const correct = puzz.sliders.every((sl, i) => {
      const val = parseInt(document.getElementById(`slider-${i}`).value);
      const tol = puzz.tolerance[i] || 0;
      return Math.abs(val - puzz.answer[i]) <= tol;
    });
    if (correct) markSolved(state.room, puzzId, puzz);
    else loseLife('Wrong values — think carefully about each clue.');
  };
  btnRow.appendChild(btn);
  body.appendChild(btnRow);
}

// ═══════════════════════════════════════════════════════
// INVENTORY
// ═══════════════════════════════════════════════════════
function addInventory(id, label) {
  if (state.inventory.find(i => i.id === id)) return;
  state.inventory.push({ id, label });
  renderInventory();
}

function renderInventory() {
  const el = document.getElementById('inv-items');
  if (state.inventory.length === 0) {
    el.innerHTML = '<span style="font-size:12px;color:var(--text3);font-family:Share Tech Mono,monospace">empty</span>';
    return;
  }
  el.innerHTML = '';
  state.inventory.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'inv-item';
    btn.textContent = item.label;
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function notify(msg, type) {
  const container = document.getElementById('notify');
  const el = document.createElement('div');
  el.className = `notif ${type || ''}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ═══════════════════════════════════════════════════════
// ADVANCE / END
// ═══════════════════════════════════════════════════════
function advanceRoom() {
  state.room++;
  if (state.room >= ROOMS.length) { showEnd(true); return; }
  renderRoom();
  window.scrollTo(0, 0);
}

function showEnd(won) {
  clearInterval(state.timerInt);
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  const es = document.getElementById('end-screen');
  document.getElementById('end-icon').textContent = won ? '🔓' : '💀';
  document.getElementById('end-title').textContent = won ? 'You Escaped.' : 'You Didn\'t Make It.';
  document.getElementById('end-body').textContent = won
    ? 'Every lock picked. Every wire connected. Every formula calculated. Four chambers, one unbroken chain of logic. You walked out.'
    : (state.lives <= 0 ? 'Three wrong answers. The system sealed you in permanently.' : 'The hour expired. The rooms reset without you.');
  document.getElementById('end-meta').textContent = `Time: ${m}m ${s}s  |  Lives remaining: ${state.lives}`;
  es.classList.add('show');
}

// ═══════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════
function startTimer() {
  clearInterval(state.timerInt);
  state.timerInt = setInterval(() => {
    state.timerSec--;
    const m = Math.floor(state.timerSec / 60), s = state.timerSec % 60;
    const el = document.getElementById('timer');
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className = 'timer' + (state.timerSec < 300 ? ' danger' : state.timerSec < 600 ? ' warn' : '');
    if (state.timerSec <= 0) showEnd(false);
  }, 1000);
}

// ═══════════════════════════════════════════════════════
// RESTART
// ═══════════════════════════════════════════════════════
function restart() {
  clearInterval(state.timerInt);
  state = { room:0, lives:3, timerSec:3600, timerInt:null, startTime:Date.now(), inventory:[], solved:{}, roomsSolved:0 };
  document.getElementById('end-screen').classList.remove('show');
  renderInventory();
  startTimer();
  renderRoom();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
startTimer();
renderRoom();
renderInventory();
</script>
