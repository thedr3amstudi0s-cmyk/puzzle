<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Escape Room Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  overflow: hidden;
}

#game {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.5s;
}

.room {
  width: 70%;
  max-width: 800px;
  padding: 20px;
  border: 1px solid #333;
  background: #141414;
  box-shadow: 0 0 20px black;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

.title {
  font-size: 20px;
  margin-bottom: 10px;
  color: #caa86a;
}

.narrative {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 20px;
}

.puzzle {
  margin-top: 10px;
}

.lock {
  display: flex;
  gap: 10px;
}

.dial {
  width: 60px;
  height: 60px;
  background: #222;
  border: 1px solid #555;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 22px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  color: white;
  border: 1px solid #444;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #888;
}
</style>
</head>

<body>

<div id="hud">Room: 1 | Lives: 3</div>
<div id="game"></div>

<script>
const Game = {
  room: 0,
  lives: 3,

  rooms: [
    {
      title: "The Locked Door",
      text: "A 3-digit lock blocks your exit.",
      answer: "123"
    },
    {
      title: "Second Chamber",
      text: "Another lock appears.",
      answer: "456"
    },
    {
      title: "Final Door",
      text: "This is the last one.",
      answer: "789"
    }
  ],

  init() {
    this.render();
  },

  render() {
    const r = this.rooms[this.room];

    document.getElementById("hud").innerText =
      `Room: ${this.room + 1} | Lives: ${this.lives}`;

    const game = document.getElementById("game");

    game.innerHTML = `
      <div class="room">
        <div class="title">${r.title}</div>
        <div class="narrative">${r.text}</div>

        <div class="puzzle">
          ${this.lockUI(r.answer)}
        </div>
      </div>
    `;

    this.bindLock(r.answer);
  },

  lockUI(answer) {
    return `
      <div class="lock">
        <div class="dial" data-i="0">0</div>
        <div class="dial" data-i="1">0</div>
        <div class="dial" data-i="2">0</div>
      </div>
      <button onclick="Game.check()">ENTER</button>
    `;
  },

  bindLock(answer) {
    document.querySelectorAll(".dial").forEach(d => {
      d.onclick = () => {
        let n = parseInt(d.innerText);
        n = (n + 1) % 10;
        d.innerText = n;
      };
    });
  },

  check() {
    const input = [...document.querySelectorAll(".dial")]
      .map(d => d.innerText)
      .join("");

    const r = this.rooms[this.room];

    if (input === r.answer) {
      this.room++;
      if (this.room >= this.rooms.length) {
        alert("YOU ESCAPED!");
        location.reload();
      } else {
        this.render();
      }
    } else {
      this.lives--;
      if (this.lives <= 0) {
        alert("GAME OVER");
        location.reload();
      } else {
        alert("Wrong!");
        this.render();
      }
    }
  }
};

Game.init();
</script>

</body>
</html>
